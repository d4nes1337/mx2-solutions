name: Build and push image

# Builds the single shared runtime image (see ../../Dockerfile — one image, four
# services differentiated only by `command:` in docker-compose.prod.yml) on
# GitHub's runners and pushes it to GHCR. The prod box only ever `docker pull`s
# this image — it never compiles anything itself (that was the whole point: the
# box is a small 2GB instance and building on it directly was taking 1+ hour and
# starving the live containers of resources).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
